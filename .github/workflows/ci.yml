name: Node CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Start Server and Run Tests
        env:
          # כאן ה-CI שואב את הכתובת מה-Secrets שהגדרת ב-GitHub
          MONGO_URI: ${{ secrets.MONGO_URI }} 
        run: |
          # הפעלת השרת ברקע
          node server/server.js & 
          # המתנה של כמה שניות שהשרת יעלה לפני תחילת הטסטים
          sleep 10 
          # הרצת הטסטים
          npm run test:e2e
